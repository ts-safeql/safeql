packages:
  - "packages/*"
  - "packages/plugins/*"
  - "apps/*"
  - "demos/*"
  - "docs"

allowBuilds:
  # Build/test tooling and the Prisma demo (pnpm prisma generate) need their scripts.
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
  # Optional native ws speed-ups: not required (pure-JS fallback) and need a
  # node-gyp toolchain to compile, so keep them disabled to avoid install breakage.
  bufferutil: false
  utf-8-validate: false

catalog:
  "@changesets/cli": "^2.28.1"
  "@eslint/js": "^10.0.1"
  "@types/node": "^24.12.0"
  "@typescript-eslint/eslint-plugin": "^8.57.1"
  "@typescript-eslint/parser": "^8.57.1"
  "@typescript-eslint/rule-tester": "^8.57.1"
  "@typescript-eslint/typescript-estree": "^8.57.1"
  "@typescript-eslint/utils": "^8.57.1"
  "eslint": "^10.0.3"
  "libpg-query": "^17.5.2"
  "postgres": "^3.4.5"
  "prettier": "^3.5.3"
  "publint": "^0.3.18"
  "tsx": "^4.19.3"
  "turbo": "^2.4.4"
  "typescript": "^5.8.2"
  "typescript-eslint": "^8.57.1"
  "unbuild": "^3.5.0"
  "vitest": "^4.1.0"
